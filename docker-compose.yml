services:
  backend:
    build:
      context: .
      target: backend
    ports:
      - "8080:8080"
    volumes:
      - ./conf/config.yaml:/app/conf/config.yaml:ro
      - backend-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - graph-info

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - graph-info

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: graphinfo
      POSTGRES_PASSWORD: graphinfo
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graphinfo -d mydb"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - graph-info

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: graphinfo
      MONGO_INITDB_ROOT_PASSWORD: graphinfo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - graph-info

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - graph-info

volumes:
  backend-data:
  postgres-data:
  mongo-data:
  minio-data:

networks:
  graph-info:
    driver: bridge
