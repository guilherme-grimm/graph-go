services:
  backend:
    build:
      context: .
      target: backend
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./conf/config.docker.yaml:/app/conf/config.yaml:ro
      - backend-data:/app/data
    labels:
      graphinfo.ignore: "true"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
      user-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
    networks:
      - graph-info

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "3000:80"
    labels:
      graphinfo.ignore: "true"
    depends_on:
      - backend
    networks:
      - graph-info

  # ── Mock application services ──────────────────────────────────────────

  api-gateway:
    build:
      context: ./services/mock-service
    environment:
      SERVICE_NAME: api-gateway
    healthcheck:
      test: ["CMD", "/mock-service", "-health-check"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - graph-info

  user-service:
    build:
      context: ./services/mock-service
    environment:
      SERVICE_NAME: user-service
    healthcheck:
      test: ["CMD", "/mock-service", "-health-check"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - graph-info

  order-service:
    build:
      context: ./services/mock-service
    environment:
      SERVICE_NAME: order-service
    healthcheck:
      test: ["CMD", "/mock-service", "-health-check"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - graph-info

  product-service:
    build:
      context: ./services/mock-service
    environment:
      SERVICE_NAME: product-service
    healthcheck:
      test: ["CMD", "/mock-service", "-health-check"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - graph-info

  media-service:
    build:
      context: ./services/mock-service
    environment:
      SERVICE_NAME: media-service
    healthcheck:
      test: ["CMD", "/mock-service", "-health-check"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - graph-info

  # ── Infrastructure ─────────────────────────────────────────────────────

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: graphinfo
      POSTGRES_PASSWORD: graphinfo
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graphinfo -d mydb"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - graph-info

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: graphinfo
      MONGO_INITDB_ROOT_PASSWORD: graphinfo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./docker/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - graph-info

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - graph-info

  # ── Discovery-only backend (no config.yaml) ──────────────────────────
  # Usage: docker compose --profile discovery up
  backend-discovery:
    profiles: ["discovery"]
    build:
      context: .
      target: backend
    ports:
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - backend-data:/app/data
    labels:
      graphinfo.ignore: "true"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      minio:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
      user-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
    networks:
      - graph-info

  minio-init:
    image: minio/mc:latest
    labels:
      graphinfo.ignore: "true"
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./docker/init-minio.sh:/init-minio.sh:ro
    entrypoint: /bin/sh
    command: /init-minio.sh
    networks:
      - graph-info

volumes:
  backend-data:
  postgres-data:
  mongo-data:
  minio-data:

networks:
  graph-info:
    driver: bridge
